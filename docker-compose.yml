version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: quotesync
      POSTGRES_USER: quotesync
      POSTGRES_PASSWORD: quotesync_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quotesync"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-sap:
    build: ./mock-sap
    ports:
      - "3001:3001"
    environment:
      PORT: 3001

  mock-cpq:
    build: ./mock-cpq
    ports:
      - "3002:3002"
    environment:
      PORT: 3002

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://quotesync:quotesync_dev@postgres:5432/quotesync
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MOCK_SAP_URL: http://mock-sap:3001
      MOCK_CPQ_URL: http://mock-cpq:3002
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      mock-sap:
        condition: service_started
      mock-cpq:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_API_URL: http://backend:3000
      VITE_VIDEO_PROBLEM: ${VITE_VIDEO_PROBLEM:-dQw4w9WgXcQ}
      VITE_VIDEO_SOLUTION: ${VITE_VIDEO_SOLUTION:-dQw4w9WgXcQ}
      VITE_VIDEO_RESULTS: ${VITE_VIDEO_RESULTS:-dQw4w9WgXcQ}
      VITE_VIDEO_DEMO: ${VITE_VIDEO_DEMO:-dQw4w9WgXcQ}
      VITE_VIDEO_SAP_SETUP: ${VITE_VIDEO_SAP_SETUP:-dQw4w9WgXcQ}
      VITE_VIDEO_CPQ_SETUP: ${VITE_VIDEO_CPQ_SETUP:-dQw4w9WgXcQ}
    depends_on:
      - backend

volumes:
  postgres_data:
