services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: quotesync
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-sap:
    build: ./mock-sap
    restart: always
    environment:
      PORT: 3001

  mock-cpq:
    build: ./mock-cpq
    restart: always
    environment:
      PORT: 3002

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/quotesync
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MOCK_SAP_URL: http://mock-sap:3001
      MOCK_CPQ_URL: http://mock-cpq:3002
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      mock-sap:
        condition: service_started
      mock-cpq:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_ORCHESTRATE_AGENT_URL: ${VITE_ORCHESTRATE_AGENT_URL:-}
    restart: always
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
